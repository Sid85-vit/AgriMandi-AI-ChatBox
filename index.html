<div class="chat-input-row" style="flex-direction: column;">
      
      <div style="display: flex; gap: 10px; padding: 10px 16px; background: var(--color-background-secondary); border-bottom: 1px solid var(--color-border-tertiary); align-items: center; flex-wrap: wrap;">
        <label style="font-size: 12px; font-weight: bold; color: var(--color-text-secondary);">Filter Dates:</label>
        <input type="date" id="start-date" title="Start Date" style="padding: 6px; border: 1px solid var(--color-border-secondary); border-radius: 4px; font-size: 12px;">
        <span style="font-size: 12px; color: var(--color-text-secondary);">to</span>
        <input type="date" id="end-date" title="End Date" style="padding: 6px; border: 1px solid var(--color-border-secondary); border-radius: 4px; font-size: 12px;">
        <span style="font-size: 11px; color: var(--color-text-tertiary); margin-left: auto;">(Leave empty for last 5 days)</span>
      </div>

      <div style="display: flex; width: 100%;">
        <input id="chat-input" type="text" placeholder="Ask about commodities, prices, predictions…" onkeydown="if(event.key==='Enter')sendMsg()" />
        <button onclick="sendMsg()" id="send-btn">SEND</button>
      </div>
    </div>
  </div>

  <div class="privacy-note">
    🔒 Data sourced directly from data.gov.in. AI analysis powered securely via cloud backend proxy.
  </div>
</div>

<script>
// ... [Keep your existing window.onload, onDataLoaded, renderStats, addBotMsg, addUserMsg, and askQuestion functions exactly the same] ...

async function sendMsg() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if(!text) return;
    
    // Grab the dates from the new UI calendar inputs
    const startDate = document.getElementById('start-date').value;
    const endDate = document.getElementById('end-date').value;

    input.value = '';
    document.getElementById('send-btn').disabled = true;
    addUserMsg(text);

    const typingDiv = addBotMsg('', true);

    try {
        const res = await fetch('https://agrimandi-ai-chatbox.onrender.com/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                message: text,
                start_date: startDate ? startDate : null,
                end_date: endDate ? endDate : null
            }) 
        });
        
        const data = await res.json();
        const reply = data.reply || 'No response generated.';
        
        typingDiv.remove();
        addBotMsg(reply);
    } catch(err) {
        typingDiv.remove();
        addBotMsg('Error communicating with the application server. Make sure server.py is running.');
    }
    document.getElementById('send-btn').disabled = false;
}
</script>
</body>
</html>
